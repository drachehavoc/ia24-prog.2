<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Client</title>
  <style>
    .add-item {
      display: flex;
      border: 1px solid black;
      border-radius: 5px;
      overflow: clip;
      
      >* {
        border: 0 none;
        
        font-size: 1.5rem;
      }
      
      >input {
        flex: 1;
        padding: 1rem;
      }
    }

    ul {
      list-style: none;
      padding: 0;

      li {
        display: flex;
        border-bottom: 1px solid black;
        overflow: clip;
        padding: .5rem;

        >* {
          border: 0 none;
        }

        >input {
          flex: 1;
        }
      }
    }
  </style>
</head>

<body>
  <div class="add-item">
    <input name="item">
    <button id="add">add</button>
  </div>
  <ul>
    <!-- aqui vão aparecer os itens cadastrados -->
    <template>
      <li>
        <input>
        <div>
          <button id="delete">delete</button>
        </div>
      </li>
    </template>
  </ul>
  <script>
    const elInput = document.querySelector("[name='item']")
    const elBtAdd = document.querySelector("#add")
    const elList = document.querySelector("ul")
    const elTemplateLi = elList.querySelector("template")

    function loadItems() {
      const items = JSON.parse(localStorage.getItem("items") || "[]")
      items.forEach(item => {
        const elNewItem = elTemplateLi.content.querySelector('li').cloneNode(true)
        elNewItem.querySelector("input").value = item
        elNewItem.querySelector("#delete").addEventListener("click", () => elNewItem.remove())
        elList.prepend(elNewItem)
      })
    }

    function saveItem(item) {
      const items = JSON.parse(localStorage.getItem("items") || "[]")
      items.push(item)
      localStorage.setItem("items", JSON.stringify(items))        
    }

    function deleteItem(item) {
      const items = JSON.parse(localStorage.getItem("items") || "[]")
      const index = items.indexOf(item)
      if (index > -1) {
        items.splice(index, 1)
        localStorage.setItem("items", JSON.stringify(items))        
      }
    }

    elBtAdd.addEventListener("click", () => {
      const elNewItem = elTemplateLi.content.querySelector('li').cloneNode(true)
      elNewItem.querySelector("input").value = elInput.value
      elNewItem.querySelector("#delete").addEventListener("click", () => elNewItem.remove())
      elList.prepend(elNewItem)
      elInput.value = ""
      saveItem(elInput.value)
    })

    loadItems()
  </script>
</body>

</html>
